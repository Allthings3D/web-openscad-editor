name: Generate and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

           - name: Compile 3D Web App Editor
        uses: yawkat/web-openscad-editor@v2.0.0
        with:
          config: editor.toml

      - name: Inject Under Construction Homepage
        run: cp index.html out/

      - name: Inject Custom Premium UI Studio
        run: cp create.html out/

      - name: Setup Pages Infrastructure
        uses: actions/configure-pages@v5

      - name: Package Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages Live
        id: deployment
        uses: actions/deploy-pages@v4
