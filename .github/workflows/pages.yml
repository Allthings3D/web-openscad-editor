name: Generate and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile 3D Web App Editor
        uses: yawkat/web-openscad-editor@v2
        with:
          config: editor.toml

      - name: Setup Pages Infrastructure
        uses: actions/configure-pages@v5

      - name: Package Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages Live
        id: deployment
        uses: actions/deploy-pages@v4
