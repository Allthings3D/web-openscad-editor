<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllThings3D | Create Your Keychain</title>
  <style>
    body {
      background-color: #090d16;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .hero {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      color: #60a5fa;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #94a3b8;
    }
    .btn-start {
      background-color: #00b074;
      color: #fff;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 15px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(0,176,116,0.2);
      transition: all 0.2s ease-in-out;
    }
    .btn-start:hover {
      background-color: #009060;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>✨ Welcome to AllThings3D Studio</h1>
    <p>Design your own premium custom keychain with personalized text, fonts, colors, and hanger options. Click below to start creating in our interactive 3D editor.</p>
    <button class="btn-start" onclick="window.location.href='keychain.html'">
      🚀 Start Designing
    </button>
  </div>
</body>
</html>
