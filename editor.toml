# Project metadata
[project]
name = "AllThings3D Studio"
uri = "https://allthings3d.co.za"

# INJECT A PREMIUM DESIGN THEME
head-extra = """
<style>
    /* 1. Brand New Layout Scheme */
    :root, [data-bs-theme="auto"], [data-bs-theme="dark"], [data-bs-theme="light"] {
        --page-bg: #f8fafc !important; /* Soft, clean crisp studio white background */
        --page-fg: #0f172a !important; /* Deep charcoal professional text font color */
        --border-color: #e2e8f0 !important; /* Clean, thin slate border dividing lines */
        --render-log-bg: #ffffff !important; /* Pure white crisp panel background cards */
        --customizer-modified-bg: #f1f5f9 !important;
    }

    /* 2. Style the Left Viewport Canvas Workspace Container */
    #pane-left {
        background-color: #ffffff !important;
        border-right: 1px solid #e2e8f0 !important;
    }
    
    #model {
        background-color: #f8fafc !important; /* Light room setup for the 3D model */
    }

    /* 3. Style the Parameter Control Side Rail Panel */
    #pane-right {
        padding: 2rem !important;
        background-color: #ffffff !important;
        box-shadow: -4px 0 24px rgba(15, 23, 42, 0.03) !important;
    }

    /* 4. Make Form Variables Look Polished and Premium */
    .form-control, .form-select {
        border: 1px solid #cbd5e1 !important;
        border-radius: 8px !important;
        padding: 10px 14px !important;
        font-size: 0.95rem !important;
        background-color: #ffffff !important;
        color: #0f172a !important;
    }

    .form-control:focus, .form-select:focus {
        border-color: #0056b3 !important;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.15) !important;
    }

    /* 5. Clean up Header Text Styling metrics */
    h3, .group-header {
        font-weight: 700 !important;
        color: #0f172a !important;
        letter-spacing: -0.02em !important;
    }

    /* 6. Security Rule: Keep default download controls locked away */
    #download-stl { display: none !important; }
    #controls { display: none !important; } /* Cleans raw render command buttons from view */
</style>

<script>
function redirectToPayFast() {
    var nameInput = document.querySelector('[id*="Customer_Name"]') || document.querySelector('[name*="Customer_Name"]') || document.querySelector('input[type="text"]');
    var customerText = nameInput ? nameInput.value : "NOT_PROVIDED";
    
    var thicknessInput = document.querySelector('[id*="Plate_Thickness"]') || document.querySelector('[name*="Plate_Thickness"]') || document.querySelector('input[type="range"]');
    var thicknessValue = thicknessInput ? thicknessInput.value : "2.5";
    
    var merchantId = "PASTE_YOUR_PAYFAST_MERCHANT_ID_HERE";
    var merchantKey = "PASTE_YOUR_PAYFAST_MERCHANT_KEY_HERE";
    var itemPrice = "120.00"; 
    var itemName = "Custom 3D Printed Name Keychain";
    
    var orderDescription = "Text: " + customerText + " | Thickness: " + thicknessValue + "mm";

    var payfastUrl = "https://payfast.co.za" +
        "?merchant_id=" + encodeURIComponent(25113480) +
        "&merchant_key=" + encodeURIComponent(xo7mpwdjhakex) +
        "&amount=" + encodeURIComponent(itemPrice) +
        "&item_name=" + encodeURIComponent(itemName) +
        "&item_description=" + encodeURIComponent(orderDescription);

    window.location.href = payfastUrl;
}
</script>
"""

# 2. BIND THE MODEL AND RENDER THE SIDEBAR CHECKOUT INTERFACE
[[model]]
file = "models/keychain.scad"
index = false # Moving this to false frees up your homepage!

# Displays your custom local billing information card inside the parameters container panel
description-extra-html = """
<div style="margin-top: 25px; padding: 20px; border: 2px solid var(--border-color); border-radius: 12px; background-color: var(--render-log-bg); text-align: center;">
    <h4 style="color: #0056b3; font-size: 1.15rem; font-weight: 700; margin-top: 0;">🇿🇦 Complete Your Order</h4>
    <p style="font-size: 0.85rem; line-height: 1.4; opacity: 0.85; margin-bottom: 15px;">
        Happy with your design layout? Click below to finalize your item and pay safely via PayFast using Credit Card or Instant EFT.
    </p>
    <button onclick="redirectToPayFast()" style="display: block; width: 100%; border: none; background-color: #0056b3; color: #ffffff; font-weight: bold; font-size: 1rem; padding: 12px; border-radius: 6px; cursor: pointer;">
        💳 Pay Securely via PayFast
    </button>
</div>
"""
