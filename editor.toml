# Project metadata
[project]
name = "AllThings3D Custom Studio"
uri = "https://allthings3d.co.za"

# ──── REGISTER & BAKE SYSTEM FONTS INTO THE WEB ENGINE ────
[openscad]
version = "2026.01.19"
font-source = "auto"
enable-features = ["text-fonts"]

# ==========================================================================
# 1. PREMIUM SKIN INJECTION (TRANSFORMS INPUTS INTO GRID PILL BUTTONS)
# ==========================================================================
head-extra = """
<style>
    /* Global Canvas Styling Reset */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
        background-color: #f1f5f9 !important;
        color: #0f172a !important;
    }

    #pane-left {
        background-color: #ffffff !important;
    }
    
    #model {
        background-color: #ffffff !important;
    }

    /* Transform Sidebar Panel */
    #pane-right {
        background-color: #ffffff !important;
        padding: 2.5rem 2rem !important;
        box-shadow: -10px 0 30px rgba(0,0,0,0.03) !important;
    }

    /* Clean Up Tab Accordion Headers */
    .group-header {
        font-size: 1.1rem !important;
        font-weight: 800 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.03em !important;
        color: #0f172a !important;
        border-bottom: 2px solid #3b82f6 !important;
        padding-bottom: 8px !important;
        margin-bottom: 20px !important;
    }

    /* FORCE SELECT DROPDOWNS TO LOOK LIKE GRID BUTTONS */
    select.form-select {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 10px !important;
        appearance: none !important;
        background: #ffffff !important;
        border: 2px solid #cbd5e1 !important;
        border-radius: 8px !important;
        padding: 12px !important;
        font-weight: 700 !important;
        color: #1e3a8a !important;
        text-align: center !important;
        cursor: pointer !important;
    }

    select.form-select:focus {
        border-color: #3b82f6 !important;
        background-color: #eff6ff !important;
    }

    /* Clean Up Typography Input Fields */
    input[type="text"].form-control {
        border: 2px solid #cbd5e1 !important;
        border-radius: 8px !important;
        padding: 12px !important;
        font-size: 1.1rem !important;
        font-weight: 600 !important;
        text-transform: uppercase !important;
    }

    /* Premium Sleek Sliders styling */
    input[type="range"] {
        height: 8px !important;
        border-radius: 9px !important;
        background: #e2e8f0 !important;
        accent-color: #3b82f6 !important;
    }

    /* Hide Original Engine Controls */
    #download-stl, #render, label[for="auto-render"], .mt-2 { 
        display: none !important; 
    }
    #controls { 
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        width: 0 !important;
        overflow: hidden !important;
    }
</style>

<script>
function redirectToPayFast() {
    var textInput = document.querySelector('input[type="text"]') || document.querySelector('[id*="Text"]');
    var customerText = textInput ? textInput.value.replace(/[^a-zA-Z0-9 ]/g, "") : "NAME";
    var rangeInput = document.querySelector('input[type="range"]') || document.querySelector('[id*="Thickness"]');
    var thicknessValue = rangeInput ? rangeInput.value : "2.5";
    
    var merchantId = "123456"; 
    var merchantKey = "abcdef";
    var itemPrice = "120.00"; 
    
    var payfastUrl = "https://payfast.co.za" + encodeURIComponent(merchantId) + "&merchant_key=" + encodeURIComponent(merchantKey) + "&amount=" + encodeURIComponent(itemPrice) + "&item_name=Custom+3D+Keychain&item_description=" + encodeURIComponent("Text: " + customerText + " | Thickness: " + thicknessValue + "mm");
    window.open(payfastUrl, "_blank");
}
</script>
"""

# ==========================================================================
# 2. BIND MODEL AND RENDER ECOMMERCE ADD TO CART FOOTER BLOCK
# ==========================================================================
[[model]]
file = "models/keychain.scad"
index = false 

description-extra-html = """
<!-- MANUFACTURE PRINTING INFORMATION CARD FOOTER -->
<div style="margin-top: 30px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: left; margin-bottom: 20px;">
    <div>
        <small style="color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.7rem;">Estimated Weight</small>
        <div style="font-weight: 800; color: #0f172a; font-size: 1.1rem;">12 g</div>
    </div>
    <div>
        <small style="color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.7rem;">Print Time</small>
        <div style="font-weight: 800; color: #0f172a; font-size: 1.1rem;">29 min</div>
    </div>
    <div>
        <small style="color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.7rem;">Size</small>
        <div style="font-weight: 800; color: #0f172a; font-size: 1.1rem;">100 x 35 mm</div>
    </div>
    <div>
        <small style="color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.7rem;">Finish</small>
        <div style="font-weight: 800; color: #0f172a; font-size: 1.1rem;">Matte</div>
    </div>
</div>

<div style="padding: 10px 0; text-align: center;">
    <!-- LIVE WEB ASSEMBLY UPDATE TRIGGER -->
    <button onclick="document.querySelector('#render').click();" style="display: block; width: 100%; border: 2px solid #3b82f6; background-color: #ffffff; color: #3b82f6; font-weight: 700; font-size: 1.05rem; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; transition: all 0.15s;">
        🔄 Refresh 3D Preview
    </button>

    <!-- PREMIUM PAYFAST CART TRIGGER -->
    <button onclick="redirectToPayFast()" style="display: flex; align-items: center; justify-content: center; width: 100%; border: none; background-color: #00b074; color: #ffffff; font-weight: 800; font-size: 1.1rem; padding: 16px; border-radius: 8px; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 176, 116, 0.3);">
        🛒 Add to Cart & Checkout
    </button>
</div>
"""

# ==========================================================================
# 3. ACCORDION CONFIGURATIONS & MENU MAPPINGS
# ==========================================================================

[model.tab-metadata."1. Personalise Your Keychain"]
collapsed = false

[model.param-metadata.Text]
description-html = "<strong>NAME OR TEXT</strong>"

[model.param-metadata.Font_name]
description-html = "<strong>STYLE</strong>"

[model.param-metadata.Font_name.presets]
text = "Select Typography Theme"
[model.param-metadata.Font_name.presets.values]
"Modern (Oswald)"   = "Oswald"
"Rounded (Chewy)"   = "Chewy"
"Script (Pacifico)" = "Pacifico"
"Bold (Anton)"      = "Anton"
"Elegant (Lobster)" = "Lobster"
"Playful (Luckiest)" = "Luckiest Guy"

[model.param-metadata.Font_Size]
description-html = "<strong>RAISED LETTERING HEIGHT</strong>"

[model.tab-metadata."2. Dual-Filament Color Options"]
collapsed = false

[model.param-metadata.Base_Color]
description-html = "<strong>KEYCHAIN BASE COLOR</strong>"

[model.param-metadata.Text_Color]
description-html = "<strong>LETTERING PLASTIC COLOR</strong>"

[model.tab-metadata."3. Base Plate Structure Controls"]
collapsed = true

[model.param-metadata.Base_Style]
description-html = "<strong>KEYCHAIN STYLE</strong>"

[model.param-metadata.Plate_Thickness]
description-html = "<strong>BASEPLATE THICKNESS</strong>"

[model.param-metadata.Border_Offset]
description-html = "<strong>OFFSET BORDER MARGINS</strong>"
