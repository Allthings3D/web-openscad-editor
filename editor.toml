# Project metadata
[project]
name = "AllThings3D Creative Engine"
uri = "https://allthings3d.co.za"

# ==========================================================================
# 1. INJECT CUSTOM UNIVERSAL STYLES & THE PAYFAST REDIRECT BRAIN
# ==========================================================================
head-extra = """
<style>
    /* Premium Dark/Light Adaptive Layout Scheme */
    :root, [data-bs-theme="light"] {
        --page-bg: #f8fafc !important;
        --pane-bg-solid: #ffffff !important;
        --page-fg: #0f172a !important;
        --border-color: #cbd5e1 !important;
        --form-input-bg: #f8fafc !important;
        --form-input-fg: #0f172a !important;
        --form-border: #4b5563 !important;
        --checkout-card-bg: #f1f5f9 !important;
    }
    @media (prefers-color-scheme: dark) {
        :root, [data-bs-theme="dark"] {
            --page-bg: #090d16 !important;
            --pane-bg-solid: #111827 !important;
            --page-fg: #f8fafc !important;
            --border-color: #374151 !important;
            --form-input-bg: #1f2937 !important;
            --form-input-fg: #f8fafc !important;
            --form-border: #6b7280 !important;
            --checkout-card-bg: #1f2937 !important;
        }
    }
    
    body { background-color: var(--page-bg) !important; color: var(--page-fg) !important; }
    #pane-left { background-color: var(--pane-bg-solid) !important; border-right: 1px solid var(--border-color) !important; }
    #model { background-color: var(--page-bg) !important; }
    #pane-right { padding: 2.5rem 2rem !important; background-color: var(--pane-bg-solid) !important; border-left: 1px solid var(--border-color) !important; }
    .form-control, .form-select, .input-group-text { border: 1px solid var(--form-border) !important; border-radius: 8px !important; padding: 12px 16px !important; background-color: var(--form-input-bg) !important; color: var(--form-input-fg) !important; }
    h3, h4, .group-header, label { font-weight: 700 !important; color: var(--page-fg) !important; }

    /* Security Rules: Hide default buttons safely without breaking the data listener track */
    #download-stl { 
        display: none !important; 
    }
    #controls { 
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        width: 0 !important;
        overflow: hidden !important;
        padding: 0 !important;
        margin: 0 !important;
    }
</style>

<script>
function redirectToPayFast() {
    var textInput = document.querySelector('input[type="text"]') || document.querySelector('[id*="Text"]');
    var customerText = textInput ? textInput.value.replace(/[^a-zA-Z0-9 ]/g, "") : "NAME";
    
    var rangeInput = document.querySelector('input[type="range"]') || document.querySelector('[id*="Thickness"]');
    var thicknessValue = rangeInput ? rangeInput.value : "2.5";
    
    var merchantId = "123456"; 
    var merchantKey = "abcdef";
    var itemPrice = "120.00"; 
    
    var payfastUrl = "https://payfast.co.za" + encodeURIComponent(merchantId) + "&merchant_key=" + encodeURIComponent(merchantKey) + "&amount=" + encodeURIComponent(itemPrice) + "&item_name=Custom+3D+Keychain&item_description=" + encodeURIComponent("Text: " + customerText + " | Thickness: " + thicknessValue + "mm");
    window.open(payfastUrl, "_blank");
}
</script>
"""

# ==========================================================================
# 2. BIND THE MODEL AND RENDER THE SIDEBAR CHECKOUT INTERFACE
# ==========================================================================
[[model]]
file = "models/keychain.scad"
index = false 

description-extra-html = """
<div style="margin-top: 25px; padding: 20px; border: 1px solid var(--border-color); border-radius: 12px; text-align: center; background-color: var(--checkout-card-bg);">
    
    <!-- INTERACTIVE UPDATE PREVIEW BUTTON (MATCHES GENERATE BUTTON STYLING) -->
    <button onclick="document.getElementById('render').click();" style="display: block; width: 100%; border: none; background-color: #007bff; color: #ffffff; font-weight: 700; font-size: 1.05rem; padding: 14px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(0,123,255,0.2);">
        ✨ Update 3D Preview
    </button>

    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">

    <h4 style="color: #0056b3; font-size: 1.15rem; font-weight: 700; margin-top: 0; margin-bottom: 8px !important;">🇿🇦 Order Details</h4>
    <p style="font-size: 0.85rem; line-height: 1.4; margin-bottom: 15px; opacity: 0.85; color: var(--page-fg);">
        Our payment routing setup is live for layout testing. Once ready to launch, use the button below to pay securely in Rands.
    </p>
    <button onclick="redirectToPayFast()" style="display: block; width: 100%; border: none; background-color: #00b074; color: #ffffff; font-weight: bold; font-size: 1rem; padding: 12px; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 12px rgba(0,176,116,0.15);">
        🚀 Pay Securely via PayFast
    </button>
</div>
"""

