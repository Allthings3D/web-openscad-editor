# Project metadata
[project]
name = "AllThings3D Custom Studio"
uri = "https://allthings3d.co.za"

# ──── REGISTER & BAKE SYSTEM FONTS INTO THE WEB ENGINE ────
[openscad]
version = "2026.01.19"
font-source = "auto"
enable-features = ["text-fonts"]

# ==========================================================================
# 1. BIND THE MODEL AND FORCE THE SIDEBAR CUSTOM COMPONENT INJECTIONS
# ==========================================================================
[[model]]
file = "models/keychain.scad"
index = false 

description-extra-html = """
<!-- INJECT CUSTOM UNIVERSAL STYLES NATIVELY INTO THE PANEL CANVAS -->
<style>
    :root, [data-bs-theme="light"] {
        --page-bg: #f8fafc !important;
        --pane-bg-solid: #ffffff !important;
        --page-fg: #0f172a !important;
        --border-color: #cbd5e1 !important;
        --form-input-bg: #f8fafc !important;
        --form-input-fg: #0f172a !important;
        --form-border: #4b5563 !important;
        --checkout-card-bg: #f1f5f9 !important;
    }
    @media (prefers-color-scheme: dark) {
        :root, [data-bs-theme="dark"] {
            --page-bg: #090d16 !important;
            --pane-bg-solid: #111827 !important;
            --page-fg: #f8fafc !important;
            --border-color: #374151 !important;
            --form-input-bg: #1f2937 !important;
            --form-input-fg: #f8fafc !important;
            --form-border: #6b7280 !important;
            --checkout-card-bg: #1f2937 !important;
        }
    }
    
    body { background-color: var(--page-bg) !important; color: var(--page-fg) !important; }
    #pane-left { background-color: var(--pane-bg-solid) !important; border-right: 1px solid var(--border-color) !important; }
    #model { background-color: var(--page-bg) !important; }
    #pane-right { padding: 2.5rem 2rem !important; background-color: var(--pane-bg-solid) !important; border-left: 1px solid var(--border-color) !important; }
    .form-control, .form-select, .input-group-text { border: 1px solid var(--form-border) !important; border-radius: 8px !important; padding: 12px 16px !important; background-color: var(--form-input-bg) !important; color: var(--form-input-fg) !important; }
    h3, h4, .group-header, label { font-weight: 700 !important; color: var(--page-fg) !important; }
    .customizer-group label { display: block !important; margin-bottom: 6px !important; font-size: 0.95rem !important; }

    /* Security Rules: Hide rough system buttons safely so they vanish from the customer screen */
    #download-stl, #render, label[for="auto-render"], .mt-2 { 
        display: none !important; 
    }
    #controls { 
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        width: 0 !important;
        overflow: hidden !important;
        padding: 0 !important;
        margin: 0 !important;
    }
</style>

<!-- MANUFACTURE PRINTING INFORMATION CARD FOOTER -->
<div style="margin-top: 30px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; background: var(--checkout-card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); text-align: left; margin-bottom: 20px;">
    <div>
        <small style="color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.7rem;">Estimated Weight</small>
        <div style="font-weight: 800; color: var(--page-fg); font-size: 1.1rem;">12 g</div>
    </div>
    <div>
        <small style="color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.7rem;">Print Time</small>
        <div style="font-weight: 800; color: var(--page-fg); font-size: 1.1rem;">29 min</div>
    </div>
    <div>
        <small style="color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.7rem;">Size</small>
        <div style="font-weight: 800; color: var(--page-fg); font-size: 1.1rem;">100 x 35 mm</div>
    </div>
    <div>
        <small style="color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.7rem;">Finish</small>
        <div style="font-weight: 800; color: var(--page-fg); font-size: 1.1rem;">Matte</div>
    </div>
</div>

<div style="padding: 10px 0; text-align: center;">
    <!-- FIXED AUTOMATION UPDATE TRIGGER BUTTON -->
    <button onclick="triggerAppUpdate()" style="display: block; width: 100%; border: 2px solid #3b82f6; background-color: var(--pane-bg-solid); color: #3b82f6; font-weight: 700; font-size: 1.05rem; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; transition: all 0.15s;">
        🔄 Refresh 3D Preview
    </button>

    <!-- PREMIUM PAYFAST CART TRIGGER -->
    <button onclick="redirectToPayFast()" style="display: flex; align-items: center; justify-content: center; width: 100%; border: none; background-color: #00b074; color: #ffffff; font-weight: 800; font-size: 1.1rem; padding: 16px; border-radius: 8px; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 176, 116, 0.3);">
        🛒 Add to Cart & Checkout
    </button>
</div>

<script>
function triggerAppUpdate() {
    // 1. Locate all selection properties fields inside the sidebar panel
    var textInput = document.querySelector('input[type="text"]') || document.querySelector('[id*="Text"]');
    var fontSelect = document.querySelector('select[id*="Font_name"]') || document.querySelector('select[name*="Font_name"]') || document.querySelectorAll('select')[0];
    var baseColorSelect = document.querySelector('select[id*="Base_Color"]') || document.querySelector('select[name*="Base_Color"]') || document.querySelectorAll('select')[1];
    var textColorSelect = document.querySelector('select[id*="Text_Color"]') || document.querySelector('select[name*="Text_Color"]') || document.querySelectorAll('select')[2];
    var styleSelect = document.querySelector('select[id*="Base_Style"]') || document.querySelector('select[name*="Base_Style"]') || document.querySelectorAll('select')[3];

    // 2. Safely apply custom text selections to the template listener objects matrix
    if (textInput) { textInput.dispatchEvent(new Event('input', { bubbles: true })); }
    if (fontSelect) { fontSelect.dispatchEvent(new Event('change', { bubbles: true })); }
    if (baseColorSelect) { baseColorSelect.dispatchEvent(new Event('change', { bubbles: true })); }
    if (textColorSelect) { textColorSelect.dispatchEvent(new Event('change', { bubbles: true })); }
    if (styleSelect) { styleSelect.dispatchEvent(new Event('change', { bubbles: true })); }

    // 3. Command the hidden core compile button element to fire rendering logic
    var nativeRenderBtn = document.querySelector('button#render') || document.getElementById('render');
    if (nativeRenderBtn) { nativeRenderBtn.click(); }
}

function redirectToPayFast() {
    var textInput = document.querySelector('input[type="text"]') || document.querySelector('[id*="Text"]');
    var customerText = textInput ? textInput.value.replace(/[^a-zA-Z0-9 ]/g, "") : "NAME";
    var rangeInput = document.querySelector('input[type="range"]') || document.querySelector('[id*="Thickness"]');
    var thicknessValue = rangeInput ? rangeInput.value : "2.5";
    
    var merchantId = "123456"; 
    var merchantKey = "abcdef";
    var itemPrice = "120.00"; 
    
    var payfastUrl = "https://payfast.co.za" + encodeURIComponent(merchantId) + "&merchant_key=" + encodeURIComponent(merchantKey) + "&amount=" + encodeURIComponent(itemPrice) + "&item_name=Custom+3D+Keychain&item_description=" + encodeURIComponent("Text: " + customerText + " | Thickness: " + thicknessValue + "mm");
    window.open(payfastUrl, "_blank");
}
</script>
"""

