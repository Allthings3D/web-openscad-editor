<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllThings3D | Premium 3D Printing studio</title>
    <style>
        :root {
            --bg: #090d16;
            --text: #f8fafc;
            --accent: #3b82f6;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8fafc;
                --text: #0f172a;
                --accent: #0056b3;
            }
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .lock-container {
            max-width: 500px;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.03em;
        }
        h1 span { color: var(--accent); }
        p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            background-color: var(--accent);
            color: #ffffff;
            border-radius: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="lock-container">
        <div class="badge">Under Construction</div>
        <h1>AllThings<span>3D</span></h1>
        <p>Our interactive 3D print creator studio is currently undergoing fine-tuning to bring you the best customizer experience in South Africa. We will be live shortly!</p>
    </div>

</body>
</html>
